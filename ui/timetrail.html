<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Time Trial</title>
<link rel="stylesheet" href="../../spz-ui/components/styles/spz-ui.css">
<link href="https://fonts.cdnfonts.com/css/panchang" rel="stylesheet">
<style>
  :root { --panchang: 'Panchang', sans-serif; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; font-family: var(--spz-font-body); }
  .overlay-center { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
  
  /* ── HUD ── */
  .hud-box { 
    position: fixed; bottom: 10vh; right: 3vw; width: 280px; 
    background: var(--spz-surface-1); border: 1px solid var(--spz-line); 
    border-radius: var(--spz-radius-4); box-shadow: var(--spz-shadow-3); overflow: hidden;
    animation: spz-in 400ms var(--spz-ease-out);
  }
  .hud-header { background: var(--spz-orange); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .hud-header-text { font-family: var(--spz-font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; color: #0a0a0a; letter-spacing: 0.1em; }
  
  .hud-timer-wrap { padding: 14px 16px 8px; }
  .hud-timer-label { font-family: var(--spz-font-mono); font-size: 10px; font-weight: 600; color: var(--spz-orange); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 2px; }
  .hud-timer-val { font-family: var(--spz-font-mono); font-size: 32px; font-weight: 600; color: var(--spz-fg-1); line-height: 1; font-variant-numeric: tabular-nums; }

  .hud-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 8px 16px 14px; border-top: 1px solid var(--spz-line-faint); }
  .hud-stat-item { display: flex; flex-direction: column; }
  .hud-stat-label { font-family: var(--spz-font-mono); font-size: 9px; color: var(--spz-fg-3); text-transform: uppercase; letter-spacing: 0.05em; }
  .hud-stat-val { font-family: var(--spz-font-mono); font-size: 14px; font-weight: 600; color: var(--spz-fg-1); }
  .hud-stat-val[data-best="true"] { color: var(--spz-success); }

  .hud-laps { max-height: 120px; overflow-y: auto; border-top: 1px solid var(--spz-line-faint); background: var(--spz-surface-2); }
  .lap-row { display: flex; align-items: center; padding: 6px 14px; border-bottom: 1px solid var(--spz-line-faint); font-family: var(--spz-font-mono); font-size: 11px; }
  .lap-row[data-best="true"] { color: var(--spz-success); background: rgba(41,211,152,0.05); }

  /* Restart Bar */
  .restart-bar { border-top: 1px solid var(--spz-line); padding: 8px 12px; cursor: pointer; transition: background 150ms; }
  .restart-bar:hover { background: var(--spz-surface-2); }
  .restart-progress { height: 2px; background: var(--spz-orange); position: absolute; bottom: 0; left: 0; transition: width 100ms linear; }

  /* ── Track Menu ── */
  .menu-card { width: 560px; max-height: 80vh; display: flex; flex-direction: column; }
  .track-row { 
    display: flex; align-items: center; padding: 12px 16px; border-radius: var(--spz-radius-3); cursor: pointer;
    transition: background 150ms; margin-bottom: 2px; border: 1px solid transparent;
  }
  .track-row:hover { background: var(--spz-surface-2); border-color: var(--spz-line); }
  .track-name { font-family: var(--spz-font-display); font-weight: 600; font-size: 15px; color: var(--spz-fg-1); flex: 1; }

  /* ── Results ── */
  .results-card { width: 440px; }
  .results-best-wrap { padding: 24px; text-align: center; border-bottom: 1px solid var(--spz-line); background: var(--spz-surface-2); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="../../spz-ui/components/Icon.jsx"></script>
<script type="text/babel" src="../../spz-ui/components/Badge.jsx"></script>
<script type="text/babel" src="../../spz-ui/components/Kbd.jsx"></script>
<script type="text/babel" src="../../spz-ui/components/Button.jsx"></script>
<script type="text/babel" src="../../spz-ui/components/Card.jsx"></script>
<script type="text/babel" src="../../spz-ui/components/Input.jsx"></script>
<script type="text/babel" src="../../spz-ui/components/Progress.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function App() {
  const [view, setView] = useState('none'); // 'menu', 'hud', 'results', 'none'
  const [tracks, setTracks] = useState([]);
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  
  const [hudData, setHudData] = useState({});
  const [timer, setTimer] = useState('--:--.---');
  const [restart, setRestart] = useState({ active: false, pct: 100, seconds: 3, key: 'BACK' });
  
  const [resultsData, setResultsData] = useState(null);

  useEffect(() => {
    const handler = (e) => {
      const { action, data } = e.data;
      switch (action) {
        case 'tt_open_menu':
          setTracks(data.tracks || []);
          setView('menu');
          break;
        case 'tt_hud_show':
          setHudData(data);
          setView('hud');
          break;
        case 'tt_timer':
          setTimer(data.formatted);
          break;
        case 'tt_lap_started':
          setHudData(prev => ({ ...prev, lap: data.lap, lapLabel: data.lapLabel, bestLap: data.bestLap }));
          setTimer('00:00.000');
          break;
        case 'tt_next_cp':
          setHudData(prev => ({ ...prev, cpIndex: data.cpIndex }));
          break;
        case 'tt_lap_complete':
          setHudData(prev => ({ ...prev, bestLap: data.bestLap, allLaps: data.allLaps }));
          break;
        case 'tt_end':
          setResultsData(data);
          setView('results');
          break;
        case 'tt_restart_start':
          setRestart(prev => ({ ...prev, active: true, pct: 100, seconds: 3 }));
          break;
        case 'tt_restart_tick':
          setRestart(prev => ({ ...prev, pct: (data.remaining / data.totalMs) * 100, seconds: data.seconds }));
          break;
        case 'tt_restart_cancel':
        case 'tt_restart_done':
          setRestart(prev => ({ ...prev, active: false, pct: 100 }));
          if (action === 'tt_restart_done') {
             setHudData(prev => ({ ...prev, lapLabel: data.lapLabel, bestLap: data.bestLap }));
             setTimer('--:--.---');
          }
          break;
        case 'tt_hide':
          setView('none');
          break;
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  const filteredTracks = tracks.filter(t => {
    const typeOk = filter === 'all' || t.type === filter;
    const nameOk = !search || t.name.toLowerCase().includes(search.toLowerCase());
    return typeOk && nameOk;
  });

  const post = (action, data = {}) => {
    fetch(`https://${GetParentResourceName()}/${action}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    }).catch(() => {});
  };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape' && view === 'menu') {
        post('tt_closeMenu');
        setView('none');
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [view]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <>
      {view === 'menu' && (
        <div className="overlay-center">
          <Card className="menu-card">
            <CardHeader title="Time Trial Session" desc="Select a track for a solo practice run. Unlimited laps.">
              <button className="spz-btn" data-variant="ghost" data-size="icon" onClick={() => { post('tt_closeMenu'); setView('none'); }}>
                <Icon name="x" size={14} />
              </button>
            </CardHeader>
            <div style={{ padding: '0 16px 12px', display: 'flex', gap: 10, alignItems: 'center' }}>
              <div style={{ display: 'flex', background: 'var(--spz-surface-3)', borderRadius: 'var(--spz-radius-3)', padding: 2 }}>
                {['all', 'circuit', 'sprint'].map(f => (
                  <button 
                    key={f} 
                    className="spz-btn" 
                    data-variant={filter === f ? 'primary' : 'ghost'} 
                    data-size="sm"
                    onClick={() => setFilter(f)}
                    style={{ textTransform: 'capitalize' }}
                  >
                    {f}
                  </button>
                ))}
              </div>
              <div style={{ position: 'relative', flex: 1 }}>
                 <Icon name="search" size={13} style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: 'var(--spz-fg-3)' }} />
                 <Input style={{ paddingLeft: 30 }} placeholder="Search tracks..." value={search} onChange={e => setSearch(e.target.value)} autoFocus />
              </div>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: '6px 12px 12px' }}>
              {filteredTracks.map(t => (
                <div key={t.index} className="track-row" onClick={() => { post('tt_selectTrack', { index: t.index }); setView('none'); }}>
                  <div className="track-name">{t.name}</div>
                  <Badge variant={t.type === 'circuit' ? 'purple' : 'orange'}>{t.type}</Badge>
                  <span style={{ fontSize: 11, color: 'var(--spz-fg-3)', marginLeft: 12, width: 60 }}>{t.type === 'circuit' ? `${t.laps} LAPS` : 'POINT-B'}</span>
                  <Icon name="chevron-right" size={14} style={{ color: 'var(--spz-fg-4)' }} />
                </div>
              ))}
              {filteredTracks.length === 0 && <div style={{ padding: 40, textAlign: 'center', color: 'var(--spz-fg-4)' }}>No tracks found</div>}
            </div>
          </Card>
        </div>
      )}

      {view === 'hud' && (
        <div className="hud-box">
          <div className="hud-header">
            <div className="hud-header-text">{hudData.track || 'Track'}</div>
            <Badge variant="solid" style={{ height: 16, fontSize: 8 }}>{hudData.trackType || 'SOLO'}</Badge>
          </div>
          <div className="hud-timer-wrap">
            <div className="hud-timer-label">{hudData.lapLabel || 'SESSION'}</div>
            <div className="hud-timer-val">{timer}</div>
          </div>
          <div className="hud-stats-grid">
            <div className="hud-stat-item">
              <span className="hud-stat-label">Best Lap</span>
              <span className="hud-stat-val" data-best="true">{hudData.bestLap || '--:--.---'}</span>
            </div>
            <div className="hud-stat-item">
               <span className="hud-stat-label">Checkpoint</span>
               <span className="hud-stat-val">{hudData.cpIndex || 1} / {hudData.cpTotal || '?'}</span>
            </div>
          </div>
          {hudData.allLaps?.length > 0 && (
            <div className="hud-laps">
              {[...hudData.allLaps].reverse().map((l, i) => (
                <div key={i} className="lap-row" data-best={l.isBest}>
                  <span style={{ width: 30, opacity: 0.5 }}>L{l.lapNum}</span>
                  <span style={{ flex: 1 }}>{l.label}</span>
                  <span style={{ fontWeight: 600 }}>{l.time}</span>
                </div>
              ))}
            </div>
          )}
          <div className="restart-bar" onClick={() => post('tt_restartBtn')}>
            {restart.active ? (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--spz-orange)' }}>RESTARTING IN {restart.seconds}...</span>
                <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}><Kbd>{restart.key}</Kbd><span style={{ fontSize: 10, color: 'var(--spz-fg-3)' }}>cancel</span></div>
                <div className="restart-progress" style={{ width: `${restart.pct}%` }} />
              </div>
            ) : (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <Icon name="rotate-ccw" size={12} style={{ color: 'var(--spz-orange)' }} />
                <span style={{ fontSize: 11, color: 'var(--spz-fg-2)' }}>Hold to Restart Session</span>
                <Kbd style={{ marginLeft: 'auto' }}>{restart.key || 'BACK'}</Kbd>
              </div>
            )}
          </div>
        </div>
      )}

      {view === 'results' && resultsData && (
        <div className="overlay-center">
          <Card className="results-card">
            <CardHeader title="Session Complete" desc={resultsData.track} />
            <div className="results-best-wrap">
              <div className="spz-eyebrow" style={{ color: 'var(--spz-orange)', marginBottom: 4 }}>Fastest Lap Time</div>
              <div style={{ fontFamily: 'var(--panchang)', fontWeight: 800, fontSize: 42, color: 'var(--spz-success)' }}>{resultsData.bestLap || '--:--.---'}</div>
            </div>
            <div style={{ maxHeight: 240, overflowY: 'auto' }}>
              {(resultsData.allLaps || []).map((l, i) => (
                <div key={i} className="lap-row" data-best={l.isBest} style={{ padding: '10px 24px' }}>
                  <span style={{ width: 40, opacity: 0.5 }}>#{l.lapNum}</span>
                  <span style={{ flex: 1 }}>{l.label}</span>
                  <span style={{ fontSize: 14, fontWeight: 700 }}>{l.time}</span>
                </div>
              ))}
            </div>
            <div style={{ padding: '16px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderTop: '1px solid var(--spz-line)' }}>
               <span style={{ fontSize: 12, color: 'var(--spz-fg-3)' }}>{resultsData.totalLaps} timed laps completed</span>
               <Button variant="primary" onClick={() => { post('tt_dismissResults'); setView('none'); }}>Dismiss</Button>
            </div>
          </Card>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

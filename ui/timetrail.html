<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPiceZ Time Trial</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    color: #fff;
    user-select: none;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Variables ─────────────────────────────────────── */
  :root {
    --orange: #f97316;
    --orange-dim: #c2510e;
    --bg-dark: rgba(10, 10, 15, 0.92);
    --bg-card: rgba(20, 20, 28, 0.95);
    --border: rgba(249, 115, 22, 0.3);
    --text-muted: #7a7a8c;
    --green: #22c55e;
    --purple: #a855f7;
  }

  /* ════════════════════════════════════════════════════
     TRACK SELECTION MENU
  ════════════════════════════════════════════════════ */

  #menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #menu-overlay.visible { display: flex; }

  #menu-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 560px;
    max-height: 78vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(249,115,22,0.15);
  }

  #menu-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #menu-header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange);
  }

  #menu-header .sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  #menu-close {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all .15s;
  }
  #menu-close:hover { border-color: var(--orange); color: var(--orange); }

  #menu-filters {
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  .filter-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover  { border-color: var(--orange); color: var(--orange); }
  .filter-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

  #track-search {
    margin-left: auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    padding: 5px 12px;
    outline: none;
    width: 150px;
    transition: border-color .15s;
  }
  #track-search:focus { border-color: var(--orange); }
  #track-search::placeholder { color: var(--text-muted); }

  #track-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 12px 12px;
  }
  #track-list::-webkit-scrollbar { width: 4px; }
  #track-list::-webkit-scrollbar-track { background: transparent; }
  #track-list::-webkit-scrollbar-thumb { background: var(--orange-dim); border-radius: 2px; }

  .track-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all .15s;
  }
  .track-item:hover {
    background: rgba(249,115,22,0.08);
    border-color: rgba(249,115,22,0.25);
  }

  .track-item .name {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 8px;
  }
  .badge.circuit { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
  .badge.sprint  { background: rgba(249,115, 22, 0.2); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }

  .track-item .laps-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 10px;
  }

  #track-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 30px;
    display: none;
  }

  /* ════════════════════════════════════════════════════
     LIVE HUD  (bottom-right corner)
  ════════════════════════════════════════════════════ */

  #hud {
    display: none;
    position: fixed;
    right: 20px;
    bottom: 90px;
    width: 270px;
    z-index: 10;
  }
  #hud.visible { display: block; }

  #hud-inner {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  #hud-track {
    background: var(--orange);
    padding: 5px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #hud-track .type-badge {
    font-size: 9px;
    opacity: 0.8;
  }

  #hud-lap-label {
    padding: 6px 12px 2px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--orange);
  }

  #hud-timer {
    padding: 0 12px 6px;
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
    color: #fff;
    line-height: 1;
  }

  #hud-divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 12px;
  }

  #hud-stats {
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }

  .stat-block .label {
    color: var(--text-muted);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1px;
  }

  .stat-block .value {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 13px;
  }

  .stat-block .value.best { color: var(--green); }

  #hud-cp {
    padding: 4px 12px 8px;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* Flash animation for new best */
  @keyframes flashGreen {
    0%, 100% { color: #fff; }
    50%       { color: var(--green); text-shadow: 0 0 12px var(--green); }
  }
  .new-best { animation: flashGreen 0.5s ease 3; }

  /* Lap times mini-list */
  #hud-laps {
    border-top: 1px solid rgba(255,255,255,0.06);
    max-height: 110px;
    overflow-y: auto;
  }
  #hud-laps::-webkit-scrollbar { display: none; }

  .lap-row {
    display: flex;
    align-items: center;
    padding: 4px 12px;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-variant-numeric: tabular-nums;
  }
  .lap-row .lap-n   { color: var(--text-muted); width: 28px; font-size: 9px; }
  .lap-row .lap-lbl { color: var(--text-muted); font-size: 9px; flex: 1; }
  .lap-row .lap-t   { font-weight: 600; }
  .lap-row.is-best .lap-t { color: var(--green); }
  .lap-row.is-best::before {
    content: "★";
    color: var(--green);
    font-size: 9px;
    margin-right: 4px;
  }

  /* ════════════════════════════════════════════════════
     RESULTS SCREEN
  ════════════════════════════════════════════════════ */

  #results-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #results-overlay.visible { display: flex; }

  #results-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 480px;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(249,115,22,0.18);
    display: flex;
    flex-direction: column;
  }

  #results-header {
    background: linear-gradient(135deg, var(--orange-dim), var(--orange));
    padding: 18px 20px;
    text-align: center;
  }
  #results-header h2 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #results-header .track-name {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  #results-best {
    padding: 16px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #results-best .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
  #results-best .time {
    font-size: 36px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--green);
    margin-top: 4px;
  }

  #results-laps {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  #results-laps::-webkit-scrollbar { width: 4px; }
  #results-laps::-webkit-scrollbar-thumb { background: var(--orange-dim); border-radius: 2px; }

  .result-row {
    display: flex;
    align-items: center;
    padding: 9px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-variant-numeric: tabular-nums;
  }
  .result-row .rn    { width: 32px; font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .result-row .rl    { flex: 1; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .result-row .rt    { font-size: 15px; font-weight: 700; }
  .result-row.is-best .rt { color: var(--green); }
  .result-row.is-best .rn { color: var(--green); }

  #results-footer {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }

  #dismiss-btn {
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 32px;
    cursor: pointer;
    transition: background .15s;
  }
  #dismiss-btn:hover { background: var(--orange-dim); }

  /* lap count chip */
  .total-laps {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* ── New-best toast ─────────────────────────────────── */
  #toast {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--green);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ── Track Selection Menu ─────────────────────────────────────────────── -->
<div id="menu-overlay">
  <div id="menu-box">
    <div id="menu-header">
      <div>
        <h1>⏱ Time Trial</h1>
        <div class="sub">SELECT A TRACK — UNLIMITED LAPS — SOLO SESSION</div>
      </div>
      <button id="menu-close">✕ ESC</button>
    </div>

    <div id="menu-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="circuit">Circuit</button>
      <button class="filter-btn" data-filter="sprint">Sprint</button>
      <input id="track-search" type="text" placeholder="Search tracks…">
    </div>

    <div id="track-list"></div>
    <div id="track-empty">No tracks match your filter.</div>
  </div>
</div>

<!-- ── Live HUD ─────────────────────────────────────────────────────────── -->
<div id="hud">
  <div id="hud-inner">
    <div id="hud-track">
      <span id="hud-track-name">—</span>
      <span class="type-badge" id="hud-track-type"></span>
    </div>
    <div id="hud-lap-label">—</div>
    <div id="hud-timer">--:--.---</div>
    <div id="hud-divider"></div>
    <div id="hud-stats">
      <div class="stat-block">
        <div class="label">Best Lap</div>
        <div class="value best" id="hud-best">--:--.---</div>
      </div>
      <div class="stat-block">
        <div class="label">Lap</div>
        <div class="value" id="hud-lap-num">—</div>
      </div>
      <div class="stat-block">
        <div class="label">Checkpoint</div>
        <div class="value" id="hud-cp-val">—</div>
      </div>
    </div>
    <div id="hud-laps"></div>
  </div>
</div>

<!-- ── Results Screen ───────────────────────────────────────────────────── -->
<div id="results-overlay">
  <div id="results-box">
    <div id="results-header">
      <h2>Time Trial — Finished</h2>
      <div class="track-name" id="results-track-name"></div>
    </div>
    <div id="results-best">
      <div class="lbl">Best Lap Time</div>
      <div class="time" id="results-best-time">--:--.---</div>
    </div>
    <div id="results-laps"></div>
    <div id="results-footer">
      <div class="total-laps" id="results-total"></div>
      <button id="dismiss-btn">Close</button>
    </div>
  </div>
</div>

<!-- ── New Best Toast ────────────────────────────────────────────────────── -->
<div id="toast">★ NEW BEST LAP!</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let _tracks      = [];
let _filter      = 'all';
let _searchQuery = '';

// ── Elements ───────────────────────────────────────────────────────────────
const menuOverlay   = document.getElementById('menu-overlay');
const trackList     = document.getElementById('track-list');
const trackEmpty    = document.getElementById('track-empty');
const trackSearch   = document.getElementById('track-search');
const hud           = document.getElementById('hud');
const hudTimer      = document.getElementById('hud-timer');
const hudLapLabel   = document.getElementById('hud-lap-label');
const hudBest       = document.getElementById('hud-best');
const hudLapNum     = document.getElementById('hud-lap-num');
const hudCpVal      = document.getElementById('hud-cp-val');
const hudLaps       = document.getElementById('hud-laps');
const hudTrackName  = document.getElementById('hud-track-name');
const hudTrackType  = document.getElementById('hud-track-type');
const resultsOverlay = document.getElementById('results-overlay');
const resultsTrack  = document.getElementById('results-track-name');
const resultsBest   = document.getElementById('results-best-time');
const resultsLaps   = document.getElementById('results-laps');
const resultsTotal  = document.getElementById('results-total');
const toast         = document.getElementById('toast');

// ── Helpers ────────────────────────────────────────────────────────────────
function post(action, data = {}) {
  fetch(`https://${GetParentResourceName()}/${action}`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(data),
  });
}

let _toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Track menu ─────────────────────────────────────────────────────────────
function renderTrackList() {
  const q     = _searchQuery.toLowerCase();
  const items = _tracks.filter(t => {
    const typeOk = _filter === 'all' || t.type === _filter;
    const nameOk = !q || t.name.toLowerCase().includes(q);
    return typeOk && nameOk;
  });

  trackList.innerHTML = '';
  trackEmpty.style.display = items.length === 0 ? 'block' : 'none';

  items.forEach(t => {
    const div = document.createElement('div');
    div.className = 'track-item';
    div.innerHTML = `
      <span class="name">${t.name}</span>
      <span class="badge ${t.type}">${t.type}</span>
      <span class="laps-label">${t.type === 'circuit' ? t.laps + ' laps' : '1 run'}</span>
    `;
    div.addEventListener('click', () => {
      post('tt_selectTrack', { index: t.index });
      menuOverlay.classList.remove('visible');
    });
    trackList.appendChild(div);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _filter = btn.dataset.filter;
    renderTrackList();
  });
});

trackSearch.addEventListener('input', e => {
  _searchQuery = e.target.value;
  renderTrackList();
});

document.getElementById('menu-close').addEventListener('click', () => {
  menuOverlay.classList.remove('visible');
  post('tt_closeMenu');
});

// ── HUD helpers ────────────────────────────────────────────────────────────
function renderLapHistory(laps) {
  hudLaps.innerHTML = '';
  const reversed = [...laps].reverse();
  reversed.forEach(l => {
    const row = document.createElement('div');
    row.className = 'lap-row' + (l.isBest ? ' is-best' : '');
    row.innerHTML = `
      <span class="lap-n">L${l.lapNum}</span>
      <span class="lap-lbl">${l.label}</span>
      <span class="lap-t">${l.time}</span>
    `;
    hudLaps.appendChild(row);
  });
}

// ── Message handler ────────────────────────────────────────────────────────
window.addEventListener('message', ({ data }) => {
  const action = data.action;
  const d      = data.data || {};

  switch (action) {

    // ── Open track menu ────────────────────────────────────────────────────
    case 'tt_open_menu':
      _tracks = d.tracks || [];
      _filter = 'all';
      _searchQuery = '';
      trackSearch.value = '';
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === 'all'));
      renderTrackList();
      menuOverlay.classList.add('visible');
      break;

    // ── Show HUD on session start ──────────────────────────────────────────
    case 'tt_hud_show':
      hudTrackName.textContent = d.track      || '—';
      hudTrackType.textContent = (d.trackType || '').toUpperCase();
      hudLapLabel.textContent  = d.lapLabel   || 'READY';
      hudBest.textContent      = d.bestLap    || '--:--.---';
      hudLapNum.textContent    = '—';
      hudCpVal.textContent     = `1 / ${d.cpTotal || '?'}`;
      hudLaps.innerHTML        = '';
      hudTimer.textContent     = '--:--.---';
      hud.classList.add('visible');
      resultsOverlay.classList.remove('visible');
      break;

    // ── Lap started ────────────────────────────────────────────────────────
    case 'tt_lap_started':
      hudLapLabel.textContent = d.lapLabel || '—';
      hudLapNum.textContent   = `${d.lap}`;
      hudBest.textContent     = d.bestLap || '--:--.---';
      hudTimer.textContent    = '00:00.000';
      break;

    // ── Timer tick ─────────────────────────────────────────────────────────
    case 'tt_timer':
      hudTimer.textContent = d.formatted || '--:--.---';
      break;

    // ── Next checkpoint ────────────────────────────────────────────────────
    case 'tt_next_cp':
      hudCpVal.textContent = `${d.cpIndex} / ${d.total}`;
      break;

    // ── Lap complete ───────────────────────────────────────────────────────
    case 'tt_lap_complete':
      hudBest.textContent  = d.bestLap  || '--:--.---';
      hudTimer.textContent = d.lapTime  || '--:--.---';
      if (d.allLaps) renderLapHistory(d.allLaps);
      if (d.isNewBest) {
        hudBest.classList.add('new-best');
        showToast('★ NEW BEST LAP  ' + d.lapTime);
        setTimeout(() => hudBest.classList.remove('new-best'), 1600);
      }
      break;

    // ── Session ended ──────────────────────────────────────────────────────
    case 'tt_end':
      hud.classList.remove('visible');
      resultsTrack.textContent = d.track || '—';
      resultsBest.textContent  = d.bestLap || '--:--.---';
      resultsTotal.textContent = `${d.totalLaps} timed lap${d.totalLaps !== 1 ? 's' : ''} completed`;
      resultsLaps.innerHTML    = '';
      (d.allLaps || []).forEach(l => {
        const row = document.createElement('div');
        row.className = 'result-row' + (l.isBest ? ' is-best' : '');
        row.innerHTML = `
          <span class="rn">#${l.lapNum}</span>
          <span class="rl">${l.label}</span>
          <span class="rt">${l.time}</span>
        `;
        resultsLaps.appendChild(row);
      });
      resultsOverlay.classList.add('visible');
      break;

    // ── Hide everything ────────────────────────────────────────────────────
    case 'tt_hide':
      hud.classList.remove('visible');
      resultsOverlay.classList.remove('visible');
      menuOverlay.classList.remove('visible');
      break;
  }
});

// ── Dismiss results ────────────────────────────────────────────────────────
document.getElementById('dismiss-btn').addEventListener('click', () => {
  resultsOverlay.classList.remove('visible');
  post('tt_dismissResults');
});

// ── ESC closes menu ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (menuOverlay.classList.contains('visible')) {
      menuOverlay.classList.remove('visible');
      post('tt_closeMenu');
    }
  }
});

// FiveM resource name helper
function GetParentResourceName() {
  return typeof window.__resource__ !== 'undefined'
    ? window.__resource__
    : 'spz-races';
}
</script>
</body>
</html>
